<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEET VOYAGER | V4.8 | Folder Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    body { background: #020617; color: #f8fafc; margin: 0; overflow-x: hidden; touch-action: manipulation; }
    .glass { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
    .btn-press:active { transform: scale(0.92); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); width: 0%; transition: width 0.4s ease; }
    #quiz-ui, #selection-ui { overflow-y: auto; }
    input[type="checkbox"] { accent-color: #6366f1; width: 1.2rem; height: 1.2rem; }

    /* ----- SPLASH SCREEN ----- */
    #splashOverlay {
      background: radial-gradient(circle at 20% 30%, #0b0f2a, #020617 90%);
      backdrop-filter: blur(4px);
      z-index: 10000;
      pointer-events: auto; /* Initial state captures clicks */
    }
    .splash-main {
      animation: glitchPulse 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards, floatGlow 3s infinite alternate;
      background: linear-gradient(135deg, #a5b4fc, #c084fc, #f0abfc);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
    }
    @keyframes glitchPulse {
      0% { opacity: 0; transform: scale(0.7) rotateX(-10deg); filter: blur(8px); }
      40% { opacity: 1; transform: scale(1.08) rotateX(0deg); filter: blur(0px); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes floatGlow {
      0% { text-shadow: 0 0 5px #6366f1; }
      100% { text-shadow: 0 0 20px #c084fc; }
    }
    .splash-sub {
      animation: fadeSlideUp 1s ease-out 0.5s both;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      border: 1px solid rgba(139, 92, 246, 0.4);
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    /* CRITICAL FIX FOR STUCK PAGE */
    .splash-fade-out {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    .code-signature { font-family: 'Courier New', monospace; font-weight: bold; }
  </style>
</head>
<body>

<div id="splashOverlay" onclick="this.remove()" class="fixed inset-0 flex items-center justify-center">
  <div class="text-center px-6">
    <div class="mb-8 flex justify-center">
        <i class="fas fa-code-branch text-6xl text-indigo-400 opacity-80 animate-pulse"></i>
    </div>
    <h1 class="splash-main text-6xl md:text-8xl font-black italic tracking-tighter mb-6">
      A UNDERRATED<br>CODER
    </h1>
    <div class="splash-sub mx-auto w-fit mt-4">
      <span class="text-sm font-mono font-bold tracking-wider text-white/90 code-signature">◈ BS CODER ◈</span>
    </div>
    <p class="text-[10px] font-mono text-indigo-300/50 mt-6 tracking-widest">⚡ THE VOYAGER ENGINE ⚡</p>
  </div>
</div>

<div id="main-ui">
  <div class="max-w-6xl mx-auto p-6 pt-10">
    <header class="flex justify-between items-start mb-12">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-white">NEET<span class="text-indigo-500">VOYAGER</span></h1>
            <div class="mt-2 inline-block px-4 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-[10px] font-black text-indigo-400 uppercase">Rank: Cadet 👨‍🚀</div>
        </div>
        <div class="flex gap-2 flex-wrap justify-end">
            <button onclick="openSelector()" class="bg-indigo-600 px-6 py-4 rounded-2xl font-black text-xs btn-press uppercase tracking-widest">Launch Test</button>
            <button onclick="exportData()" class="bg-slate-800 p-4 rounded-2xl btn-press"><i class="fas fa-save"></i></button>
            <button onclick="document.getElementById('full-backup-upload').click()" class="bg-emerald-600 p-4 rounded-2xl btn-press"><i class="fas fa-file-import"></i></button>
            <button onclick="setupBackupFolder()" class="bg-amber-700 p-4 rounded-2xl btn-press"><i class="fas fa-folder-open"></i></button>
            <button onclick="exportToFolder()" class="bg-teal-600 p-4 rounded-2xl btn-press"><i class="fas fa-folder-plus"></i></button>
        </div>
    </header>

    <div id="folderStatus" class="mb-6 text-[10px] flex items-center gap-3 p-3 rounded-xl bg-slate-800/40 border border-white/5">
        <i class="fas fa-database text-indigo-400"></i>
        <span id="folderPathDisplay" class="text-indigo-300 font-bold">Backup Folder: Not set</span>
        <button onclick="clearFolderHandle()" class="ml-auto text-red-400 underline">Reset</button>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-12">
        <div class="glass p-5 rounded-3xl border-l-4 border-emerald-500"><p class="text-[9px] opacity-40 mb-1">Botany</p><p id="s-bot" class="text-2xl font-black">0</p></div>
        <div class="glass p-5 rounded-3xl border-l-4 border-yellow-500"><p class="text-[9px] opacity-40 mb-1">Zoology</p><p id="s-zoo" class="text-2xl font-black">0</p></div>
        <div class="glass p-5 rounded-3xl border-l-4 border-blue-500"><p class="text-[9px] opacity-40 mb-1">Physics</p><p id="s-phy" class="text-2xl font-black">0</p></div>
        <div class="glass p-5 rounded-3xl border-l-4 border-purple-500"><p class="text-[9px] opacity-40 mb-1">Chemistry</p><p id="s-che" class="text-2xl font-black">0</p></div>
        <div class="bg-indigo-600 p-5 rounded-3xl"><p class="text-[9px] opacity-70 mb-1">Total XP</p><p id="s-tot" class="text-3xl font-black">0</p></div>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
        <aside class="lg:w-72">
            <div class="glass p-6 rounded-[2rem] sticky top-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black opacity-40 uppercase">Archive</span>
                    <button onclick="addCh()" class="w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400">+</button>
                </div>
                <div id="tree" class="space-y-3 max-h-[50vh] overflow-y-auto pr-2"></div>
                <button onclick="viewGrave()" class="w-full mt-8 p-4 rounded-2xl bg-red-900/20 text-red-400 text-[10px] font-black btn-press flex justify-between items-center border border-red-900/30">
                    GRAVEYARD <span id="grave-count" class="bg-red-500/20 px-2 py-1 rounded">0</span> <i class="fas fa-skull"></i>
                </button>
            </div>
        </aside>
        <main class="flex-1 glass rounded-[2.5rem] p-8 min-h-[55vh]">
            <div id="topic-head" class="hidden mb-8 border-b border-white/5 pb-6">
                <div class="flex justify-between items-center">
                    <h2 id="t-name" class="text-2xl font-black italic"></h2>
                    <div class="flex gap-2">
                        <button onclick="importJSONText()" class="bg-indigo-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Paste JSON</button>
                        <button onclick="deleteTopic()" class="text-red-500 bg-red-500/10 p-3 rounded-xl"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
            <div id="qs-box" class="grid gap-4 md:grid-cols-2"></div>
        </main>
    </div>
  </div>
</div>

<div id="selection-ui" class="hidden fixed inset-0 bg-[#020617]/95 z-[550] backdrop-blur-xl p-6 flex items-center justify-center">
    <div class="glass max-w-2xl w-full p-8 rounded-[2.5rem] max-h-[85vh] flex flex-col">
        <h2 class="text-2xl font-black italic mb-8">MISSION BRIEFING</h2>
        <div id="selector-list" class="flex-1 overflow-y-auto space-y-4 mb-8"></div>
        <div class="flex gap-4">
            <button onclick="closeSelector()" class="flex-1 p-4 rounded-2xl bg-white/5 text-[10px] font-black uppercase">Cancel</button>
            <button onclick="startCustomQuiz()" class="flex-1 p-4 rounded-2xl bg-indigo-600 text-[10px] font-black uppercase">Start</button>
        </div>
    </div>
</div>

<div id="quiz-ui" class="hidden fixed inset-0 bg-[#020617] z-[600] flex flex-col p-6">
    <div class="w-full flex justify-between items-center mb-8">
        <button onclick="endTest()" class="bg-red-500/10 text-red-500 px-6 py-3 rounded-full font-black text-[10px] uppercase">Exit</button>
        <button id="next-btn" onclick="goNext()" class="hidden bg-white text-black px-10 py-4 rounded-full font-black text-[12px] uppercase">Next <i class="fas fa-arrow-right"></i></button>
    </div>
    <div class="flex-1 flex flex-col items-center justify-center max-w-4xl mx-auto w-full">
        <div class="h-1.5 bg-white/5 w-full mb-12 rounded-full overflow-hidden"><div id="q-progress" class="progress-fill"></div></div>
        <h2 id="q-txt" class="text-2xl font-black mb-12 text-center italic"></h2>
        <div id="q-options" class="grid gap-4 w-full"></div>
    </div>
</div>

<input type="file" id="full-backup-upload" class="hidden" accept=".json" onchange="handleFullMerge(event)">

<script>
    const KEY = "VOYAGER_V48_STABLE";
    let db = { chapters: [], scores: { botany:0, zoology:0, physics:0, chemistry:0 }, grave: [] };
    let sess = { list:[], idx:0 };
    let cur = { ch:null, top:null };
    let folderHandle = null;

    // ----- INITIALIZATION & SPLASH FIX -----
    window.onload = function() {
        // Force dismiss splash after 2.2 seconds
        setTimeout(() => {
            const splash = document.getElementById('splashOverlay');
            if(splash) {
                splash.classList.add('splash-fade-out');
                setTimeout(() => splash.remove(), 1000);
            }
        }, 2200);

        // Load data
        const saved = localStorage.getItem(KEY);
        if(saved) {
            try {
                db = JSON.parse(saved);
                if(!db.grave) db.grave = [];
            } catch(e) { console.error("Data corruption reset"); }
        }
        renderTree();
        updateScores();
        loadFolderUI();
    };

    function save() { localStorage.setItem(KEY, JSON.stringify(db)); updateScores(); }
    
    function updateScores() {
        const s = db.scores || {botany:0, zoology:0, physics:0, chemistry:0};
        const tot = Object.values(s).reduce((a, b) => a + b, 0);
        document.getElementById('s-bot').innerText = s.botany || 0;
        document.getElementById('s-zoo').innerText = s.zoology || 0;
        document.getElementById('s-phy').innerText = s.physics || 0;
        document.getElementById('s-che').innerText = s.chemistry || 0;
        document.getElementById('s-tot').innerText = tot;
        document.getElementById('grave-count').innerText = db.grave.length;
    }

    function renderTree() {
        document.getElementById('tree').innerHTML = db.chapters.map(c => `
            <div class="mb-5">
                <div class="flex justify-between text-[9px] font-black opacity-30 mb-2 uppercase"><span>${c.name}</span><button onclick="addTop('${c.id}')">+</button></div>
                <div class="space-y-2">
                ${c.topics.map(tp => `<div onclick="viewTop('${c.id}','${tp.id}')" class="p-4 bg-white/5 rounded-2xl text-xs font-bold btn-press flex justify-between items-center"><span>${tp.name}</span></div>`).join('')}
                </div>
            </div>`).join('') || '<p class="opacity-20 text-center py-10 text-[10px]">EMPTY ARCHIVE</p>';
    }

    function addCh() { let n = prompt("Chapter Name:"); if(n) { db.chapters.push({id:Date.now(), name:n, topics:[]}); save(); renderTree(); } }
    
    function addTop(cid) { 
        let n = prompt("Topic Name:"); 
        if(n) { 
            let s = prompt("Subject (botany/zoology/physics/chemistry):").toLowerCase();
            if(!['botany','zoology','physics','chemistry'].includes(s)) return alert("Invalid subject!");
            db.chapters.find(x => x.id == cid).topics.push({id:Date.now(), name:n, sub:s, questions:[]});
            save(); renderTree();
        } 
    }

    function viewTop(cid, tid) {
        let tp = db.chapters.find(x => x.id == cid)?.topics.find(y => y.id == tid);
        if(!tp) return;
        cur.ch = cid; cur.top = tid;
        document.getElementById('topic-head').classList.remove('hidden');
        document.getElementById('t-name').innerText = tp.name;
        renderQs(tp.questions);
    }

    function renderQs(qs) {
        document.getElementById('qs-box').innerHTML = qs.map((q,i) => `<div class="p-5 bg-white/5 rounded-3xl text-[11px] border border-white/5"><p class="font-bold mb-2">${i+1}. ${q.question}</p><span class="text-indigo-400 font-black">ANS: ${q.ans}</span></div>`).join('');
    }

    function importJSONText() {
        let raw = prompt("Paste MCQ JSON:");
        if(raw) {
            try {
                let incoming = JSON.parse(raw);
                let tp = db.chapters.find(x => x.id == cur.ch)?.topics.find(y => y.id == cur.top);
                if(!tp) return alert("Select a topic first.");
                tp.questions.push(...incoming);
                save(); renderQs(tp.questions);
            } catch(e) { alert("Invalid JSON"); }
        }
    }

    // --- FOLDER SYNC LOGIC ---
    async function setupBackupFolder() {
        try {
            folderHandle = await window.showDirectoryPicker();
            localStorage.setItem('VOYAGER_FOLDER_NAME', folderHandle.name);
            loadFolderUI();
        } catch(e) {}
    }

    function loadFolderUI() {
        const name = localStorage.getItem('VOYAGER_FOLDER_NAME');
        document.getElementById('folderPathDisplay').innerText = name ? `Backup: ${name}` : "Backup Folder: Not set";
    }

    async function exportToFolder() {
        if(!folderHandle) return alert("Set folder first!");
        try {
            const fileHandle = await folderHandle.getFileHandle(`VOYAGER_BACKUP.json`, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify(db));
            await writable.close();
            alert("Saved to folder!");
        } catch(e) { alert("Export error. Re-select folder."); }
    }

    function clearFolderHandle() { folderHandle = null; localStorage.removeItem('VOYAGER_FOLDER_NAME'); loadFolderUI(); }

    // --- QUIZ LOGIC ---
    function openSelector() {
        let list = document.getElementById('selector-list'); list.innerHTML = '';
        db.chapters.forEach(c => {
            c.topics.forEach(tp => {
                list.innerHTML += `<label class="flex items-center gap-4 p-4 bg-white/5 rounded-2xl mb-2"><input type="checkbox" value="${tp.id}" data-ch="${c.id}"><div><p class="text-xs font-bold">${tp.name}</p><p class="text-[8px] opacity-40 uppercase">${tp.sub}</p></div></label>`;
            });
        });
        document.getElementById('selection-ui').classList.remove('hidden');
    }

    function startCustomQuiz() {
        const boxes = document.querySelectorAll('#selector-list input:checked');
        sess.list = [];
        boxes.forEach(b => {
            const tp = db.chapters.find(c => c.id == b.dataset.ch).topics.find(t => t.id == b.value);
            tp.questions.forEach(q => sess.list.push({...q, sub: tp.sub}));
        });
        if(sess.list.length === 0) return alert("Empty!");
        document.getElementById('selection-ui').classList.add('hidden');
        sess.list.sort(() => Math.random() - 0.5); sess.idx = 0;
        document.getElementById('quiz-ui').classList.remove('hidden'); showQ();
    }

    function showQ() {
        let q = sess.list[sess.idx];
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('q-txt').innerText = q.question;
        document.getElementById('q-progress').style.width = `${(sess.idx/sess.list.length)*100}%`;
        let o = document.getElementById('q-options'); o.innerHTML = '';
        ['a','b','c','d'].forEach(l => {
            let btn = document.createElement('button');
            btn.className = "p-5 bg-white/5 rounded-2xl text-left border border-white/10 btn-press uppercase text-xs";
            btn.innerHTML = `<span class="mr-4 opacity-40">${l})</span> ${q[l]}`;
            btn.onclick = () => {
                if(l.toUpperCase() === q.ans.toUpperCase()) {
                    btn.style.borderColor = "#10b981";
                    db.scores[q.sub] += 4;
                } else {
                    btn.style.borderColor = "#ef4444";
                    db.scores[q.sub] -= 1;
                    if(!db.grave.some(x => x.question === q.question)) db.grave.push(q);
                }
                save(); document.getElementById('next-btn').classList.remove('hidden');
                o.querySelectorAll('button').forEach(b => b.onclick = null);
            };
            o.appendChild(btn);
        });
    }

    function goNext() { sess.idx++; if(sess.idx < sess.list.length) showQ(); else endTest(); }
    function endTest() { document.getElementById('quiz-ui').classList.add('hidden'); location.reload(); }
    function closeSelector() { document.getElementById('selection-ui').classList.add('hidden'); }
    function viewGrave() { document.getElementById('topic-head').classList.remove('hidden'); document.getElementById('t-name').innerText = 'GRAVEYARD'; renderQs(db.grave); }
    function exportData() { const b = new Blob([JSON.stringify(db)], {type:"application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `VOYAGER_${Date.now()}.json`; a.click(); }
    function handleFullMerge(e) { const r = new FileReader(); r.onload = x => { db = JSON.parse(x.target.result); save(); location.reload(); }; r.readAsText(e.target.files[0]); }
    function deleteTopic() { if(confirm("Delete topic?")) { const ch = db.chapters.find(c => c.id == cur.ch); ch.topics = ch.topics.filter(t => t.id != cur.top); save(); location.reload(); } }
</script>
</body>
</html>
